# ~/.config/hypr/hyprshot.conf

# Качество JPEG (1-100)
quality = 90

# Формат изображения (png, jpg)
format = png

# Папка для сохранения
output_dir = ~/Pictures/Screenshots

# Показывать уведомление
enable_notifications = true

# Звуковой сигнал
enable_sound = true

# Задержка перед снимком (в секундах)
delay = 0

# Курсор мыши на скриншоте
show_cursor = true
